name: Cursor Compatibility Monitor

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
    inputs:
      code_ref:
        description: "Optional git ref for the package code under test"
        required: false
        type: string
      force_run:
        description: "Run even if the target Cursor version is already marked pass"
        required: false
        default: false
        type: boolean
      record_results:
        description: "Write results back to compatibility records"
        required: false
        default: false
        type: boolean
      force_version:
        description: "Optional Cursor version override for backtests"
        required: false
        type: string
      force_commit:
        description: "Commit SHA paired with force_version"
        required: false
        type: string
      force_linux_server_url:
        description: "Linux server download URL override"
        required: false
        type: string
      force_linux_gui_url:
        description: "Linux GUI download URL override"
        required: false
        type: string
      force_macos_gui_url:
        description: "macOS GUI download URL override"
        required: false
        type: string
      force_windows_gui_url:
        description: "Windows GUI download URL override"
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: cursor-compat
  cancel-in-progress: false

jobs:
  detect:
    name: Detect new Cursor version
    runs-on: ubuntu-latest
    outputs:
      needs_test: ${{ steps.detect.outputs.needs_test }}
      version: ${{ steps.detect.outputs.version }}
      commit: ${{ steps.detect.outputs.commit }}
      code_ref: ${{ steps.detect.outputs.code_ref }}
      record_results: ${{ steps.detect.outputs.record_results }}
      linux_server_url: ${{ steps.detect.outputs.linux_server_url }}
      linux_gui_url: ${{ steps.detect.outputs.linux_gui_url }}
      macos_gui_url: ${{ steps.detect.outputs.macos_gui_url }}
      windows_gui_url: ${{ steps.detect.outputs.windows_gui_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect version to test
        id: detect
        shell: bash
        env:
          INPUT_CODE_REF: ${{ inputs.code_ref }}
          INPUT_FORCE_RUN: ${{ inputs.force_run }}
          INPUT_RECORD_RESULTS: ${{ inputs.record_results }}
          INPUT_FORCE_VERSION: ${{ inputs.force_version }}
          INPUT_FORCE_COMMIT: ${{ inputs.force_commit }}
          INPUT_FORCE_LINUX_SERVER_URL: ${{ inputs.force_linux_server_url }}
          INPUT_FORCE_LINUX_GUI_URL: ${{ inputs.force_linux_gui_url }}
          INPUT_FORCE_MACOS_GUI_URL: ${{ inputs.force_macos_gui_url }}
          INPUT_FORCE_WINDOWS_GUI_URL: ${{ inputs.force_windows_gui_url }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import json
          import os
          import urllib.request
          from pathlib import Path

          api_base = "https://www.cursor.com/api/download?releaseTrack=stable&platform="
          headers = {"User-Agent": "cursor-gui-patch-compat"}
          targets = {
              "linux_server_url": "linux-x64",
              "linux_gui_url": "linux-x64",
              "macos_gui_url": "darwin-arm64",
              "windows_gui_url": "win32-x64",
          }

          def fetch(platform: str) -> dict:
              req = urllib.request.Request(api_base + platform, headers=headers)
              with urllib.request.urlopen(req, timeout=30) as resp:
                  return json.load(resp)

          event_name = os.environ.get("GITHUB_EVENT_NAME", "")
          input_code_ref = str(os.environ.get("INPUT_CODE_REF", "")).strip()
          input_force_run = os.environ.get("INPUT_FORCE_RUN", "").lower() == "true"
          input_record_results = os.environ.get("INPUT_RECORD_RESULTS", "").lower() == "true"
          code_ref = input_code_ref or str(os.environ.get("GITHUB_SHA", "")).strip()
          force_downloads = {
              "linux_server_url": str(os.environ.get("INPUT_FORCE_LINUX_SERVER_URL", "")).strip(),
              "linux_gui_url": str(os.environ.get("INPUT_FORCE_LINUX_GUI_URL", "")).strip(),
              "macos_gui_url": str(os.environ.get("INPUT_FORCE_MACOS_GUI_URL", "")).strip(),
              "windows_gui_url": str(os.environ.get("INPUT_FORCE_WINDOWS_GUI_URL", "")).strip(),
          }
          force_version = str(os.environ.get("INPUT_FORCE_VERSION", "")).strip()
          force_commit = str(os.environ.get("INPUT_FORCE_COMMIT", "")).strip()
          has_force_override = any([force_version, force_commit, *force_downloads.values()])

          if has_force_override:
              missing = [
                  name
                  for name, value in {
                      "force_version": force_version,
                      "force_commit": force_commit,
                      "force_linux_server_url": force_downloads["linux_server_url"],
                      "force_linux_gui_url": force_downloads["linux_gui_url"],
                      "force_macos_gui_url": force_downloads["macos_gui_url"],
                      "force_windows_gui_url": force_downloads["windows_gui_url"],
                  }.items()
                  if not value
              ]
              if missing:
                  raise SystemExit(
                      "Manual compatibility override is incomplete; missing: "
                      + ", ".join(missing)
                  )
              version = force_version
              commit = force_commit
              downloads = force_downloads
          else:
              linux_info = fetch("linux-x64")
              version = str(linux_info.get("version", "")).strip()
              commit = str(linux_info.get("commitSha", "")).strip()
              if not version or not commit:
                  raise SystemExit("Could not parse latest Cursor version info")

              downloads = {
                  "linux_server_url": str(linux_info.get("rehUrl", "")).strip(),
                  "linux_gui_url": str(linux_info.get("downloadUrl", "")).strip(),
              }
              for output_name, platform in targets.items():
                  if output_name in downloads:
                      continue
                  info = fetch(platform)
                  downloads[output_name] = str(info.get("downloadUrl", "")).strip()

          if not all(downloads.values()):
              raise SystemExit(f"Missing download URLs: {downloads}")

          tested_path = Path("scripts/cursor_tested_versions.txt")
          manual_backtest = event_name == "workflow_dispatch" and bool(
              input_code_ref or has_force_override or input_force_run
          )
          record_results = event_name != "workflow_dispatch" or input_record_results
          needs_test = True
          if tested_path.exists() and not manual_backtest:
              for line in tested_path.read_text(encoding="utf-8").splitlines():
                  parts = line.split()
                  if len(parts) >= 4 and parts[0] == version and parts[3] == "pass":
                      needs_test = False
                      break

          with open("/tmp/cursor-compat-outputs.txt", "w", encoding="utf-8") as f:
              f.write(f"version={version}\n")
              f.write(f"commit={commit}\n")
              f.write(f"code_ref={code_ref}\n")
              f.write(f"record_results={'true' if record_results else 'false'}\n")
              f.write(f"needs_test={'true' if needs_test else 'false'}\n")
              for key, value in downloads.items():
                  f.write(f"{key}={value}\n")
          PY

          cat /tmp/cursor-compat-outputs.txt >> "$GITHUB_OUTPUT"

  hot-patch-guard:
    name: Hot patch guard
    runs-on: ubuntu-latest
    needs: detect
    if: needs.detect.outputs.needs_test == 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Materialize package code under test
        if: ${{ needs.detect.outputs.code_ref != github.sha }}
        shell: bash
        run: |
          set -euo pipefail
          git checkout "${{ needs.detect.outputs.code_ref }}" -- cursor_gui_patch

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package and pytest
        run: python -m pip install -e . pytest

      - name: Run hot-patch regression tests
        shell: bash
        env:
          CURSOR_VERSION: ${{ needs.detect.outputs.version }}
          CURSOR_COMMIT: ${{ needs.detect.outputs.commit }}
        run: |
          set +e
          python -m pytest -q \
            tests/test_hot_patch_regression.py \
            tests/test_patching.py::TestExtensionHostHashes::test_patch_updates_hashes \
            tests/test_report.py::TestPatchReportSummary::test_includes_relaunch_hint_when_successful
          status=$?
          mkdir -p results
          STATUS_WORD="fail"
          if [ "$status" -eq 0 ]; then
            STATUS_WORD="pass"
          fi
          export STATUS_WORD
          python3 - <<'PY'
          import json
          import os

          payload = {
              "target": "hot-patch-guard",
              "results": {
                  os.environ["CURSOR_VERSION"]: {
                      "commit": os.environ["CURSOR_COMMIT"],
                      "status": os.environ["STATUS_WORD"],
                  }
              },
          }
          with open("results/hot-patch-guard.json", "w", encoding="utf-8") as f:
              json.dump(payload, f, indent=2, sort_keys=True)
          PY
          exit "$status"

      - name: Upload hot-patch guard results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cursor-compat-results-hot-patch-guard
          path: results/hot-patch-guard.json

  compat:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    needs: detect
    if: needs.detect.outputs.needs_test == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: linux-server
            download_url: ${{ needs.detect.outputs.linux_server_url }}
          - runner: ubuntu-latest
            target: linux-gui
            download_url: ${{ needs.detect.outputs.linux_gui_url }}
          - runner: macos-14
            target: macos-gui
            download_url: ${{ needs.detect.outputs.macos_gui_url }}
          - runner: windows-latest
            target: windows-gui
            download_url: ${{ needs.detect.outputs.windows_gui_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Materialize package code under test
        if: ${{ needs.detect.outputs.code_ref != github.sha }}
        shell: bash
        run: |
          set -euo pipefail
          git checkout "${{ needs.detect.outputs.code_ref }}" -- cursor_gui_patch

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: python -m pip install -e .

      - name: Run compatibility check
        run: >
          python scripts/cursor_compat_runner.py
          --target "${{ matrix.target }}"
          --version "${{ needs.detect.outputs.version }}"
          --commit "${{ needs.detect.outputs.commit }}"
          --download-url "${{ matrix.download_url }}"
          --output "results/${{ matrix.target }}.json"
          --artifacts-dir "compat-work/${{ matrix.target }}"

      - name: Upload compatibility results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cursor-compat-results-${{ matrix.target }}
          path: results/${{ matrix.target }}.json

  update:
    name: Update compatibility records
    runs-on: ubuntu-latest
    needs: [detect, hot-patch-guard, compat]
    if: ${{ always() && needs.detect.result == 'success' && needs.detect.outputs.needs_test == 'true' && needs.detect.outputs.record_results == 'true' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download results
        uses: actions/download-artifact@v4
        continue-on-error: true
        with:
          pattern: cursor-compat-results-*
          path: results
          merge-multiple: true

      - name: Update compatibility table
        shell: bash
        env:
          CURSOR_VERSION: ${{ needs.detect.outputs.version }}
          CURSOR_COMMIT: ${{ needs.detect.outputs.commit }}
        run: |
          set -euo pipefail
          missing_json="$(python3 - <<'PY'
          import json
          import os
          print(json.dumps([{
              "version": os.environ["CURSOR_VERSION"],
              "commit": os.environ["CURSOR_COMMIT"],
          }]))
          PY
          )"
          python3 scripts/cursor_compat_sync.py \
            --missing-json "$missing_json" \
            --results-dir results

      - name: Commit changes
        shell: bash
        env:
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
        run: |
          set -euo pipefail
          git add docs/cursor_compatibility.md scripts/cursor_tested_versions.txt
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore: sync Cursor compatibility"
          git push
